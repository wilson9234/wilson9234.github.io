<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — VetCare Pro</title>
<meta name="description" content="Log in to your VetCare Pro account to manage your pets and appointments.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header site-header-simple">
  <a href="index.html" class="logo">
    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="7" cy="7" r="2"></circle>
      <circle cx="12" cy="5" r="2"></circle>
      <circle cx="17" cy="7" r="2"></circle>
      <path d="M8.5 14c-2 0-3.5 1.6-3.5 3.4 0 1.5 1.2 2.6 2.7 2.6.9 0 1.6-.4 2.3-.9.7-.6 1.3-.9 2-.9s1.3.3 2 .9c.7.5 1.4.9 2.3.9 1.5 0 2.7-1.1 2.7-2.6 0-1.8-1.5-3.4-3.5-3.4-1.1 0-2 .4-2.5 1-.5-.6-1.4-1-2.5-1z"></path>
    </svg>
    <span class="logo-text">VetCare <strong>Pro</strong></span>
  </a>

  <a href="index.html" class="back-link">&larr; Back to home</a>
</header>

<main class="auth-main">
  <section class="auth-card">
    <p class="eyebrow">Welcome back</p>
    <h1>Log in to your account</h1>
    <p class="auth-sub">Manage your pets, appointments and invoices in one place.</p>

    <p id="errorMessage" class="form-error" role="alert"></p>

    <form id="loginForm" novalidate>
      <div class="form-field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required>
      </div>

      <div class="form-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required minlength="6">
      </div>

      <button type="submit" class="btn btn-primary btn-block">Log In</button>
    </form>

    <div class="demo-hint">
      <p class="demo-hint-title">Demo account</p>
      <p>john.smith@example.com &nbsp;/&nbsp; Password123</p>
    </div>

    <p class="auth-switch">New here? <a href="register.html" class="auth-switch-link">Create an account</a></p>
  </section>
</main>

<footer class="site-footer site-footer-simple">
  <p class="footer-copy">&copy; 2026 VetCare Pro. All rights reserved.</p>
</footer>

<script src="script.js"></script>
</body>
</html>
